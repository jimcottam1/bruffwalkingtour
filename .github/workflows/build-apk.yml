name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with build number
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/bruff-tour.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bruff-tour-apk
          path: app/build/outputs/apk/debug/bruff-tour.apk
          retention-days: 30

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            **Bruff Walking Tour — latest debug build**

            Built automatically from the most recent commit on `main`.

            ### Install instructions
            1. Download `bruff-tour.apk` below.
            2. Open the file on your Android phone.
            3. If prompted, allow installation from unknown sources.
          prerelease: true
          make_latest: true
          files: app/build/outputs/apk/debug/bruff-tour.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
